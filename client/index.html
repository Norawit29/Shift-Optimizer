    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Shift Optimizer",
      "url": "https://shift-optimizer.com",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "description": "Free shift scheduling software that automatically creates fair, balanced duty rosters for hospitals and healthcare facilities. Supports up to 5 staff levels, complex constraints, and Excel export.",
      "featureList": [
        "Fair and balanced shift distribution",
        "Support for up to 5 staff levels",
        "Consecutive shift rules (same-day and next-day)",

        "Excel export with color-coded rosters",

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How many staff members can Shift Optimizer handle?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "There is no fixed limit. Shift Optimizer works well for small teams of 5–10 people and scales up to large departments with 50+ staff across multiple levels. Scheduling typically completes within seconds regardless of team size."
          }
        },
        {
          "@type": "Question",
          "name": "Can staff request specific shifts they want to work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Each staff member can mark preferred shifts on the calendar, and the system will assign those shifts whenever possible. You can also block dates when someone is unavailable."
          }
        },
        {
          "@type": "Question",
          "name": "What constraints does the scheduler support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The scheduler supports blocked dates, requested shifts, consecutive shift rules (same-day and next-day), maximum consecutive working days, separate weekend/holiday staffing, up to 5 staff levels with minimum per-level requirements, and maximum shifts per person."
          }
        },
        {
          "@type": "Question",
          "name": "Can I export the schedule?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, you can export the generated schedule to Excel with color-coded cells, staff level indicators, and fulfilled request markers. The export is print-ready and includes all shift assignments."
          }
        }
      ]
    }
